<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anor zo'r - Доставка</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 16px;
        }

        .brand-name {
            font-family: 'Philosopher', sans-serif;
            font-size: 32px;
            font-weight: 700;
            font-style: italic;
            color: #1a1a1a;
            margin: 0 0 32px 0;
            letter-spacing: 1px;
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #00a170;
        }

        .input-group {
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #00a170;
        }

        .btn-primary {
            width: 100%;
            background-color: #00a170;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-primary:hover {
            background-color: #008a60;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* SVG Стили для граната */
        .anor-svg {
            width: 80px;
            height: 80px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <!-- SVG Гранат с неровными формами -->
            <svg class="anor-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Органическая кожура -->
                <path d="M50 10 
                         C60 9, 85 14, 92 45 
                         C98 75, 78 95, 52 96 
                         C25 97, 2 85, 8 50 
                         C12 15, 40 11, 50 10 Z" 
                      fill="#d31724" />
                
                <!-- Стилизованная корона -->
                <path d="M40 11 L35 4 L45 10 L50 2 L55 10 L65 4 L60 11 Z" fill="#d31724" />

                <!-- Внутренний срез (мякоть) -->
                <path d="M50 25 
                         C68 25, 82 40, 82 58 
                         C82 78, 65 88, 50 88 
                         C35 88, 18 78, 18 58 
                         C18 40, 32 25, 50 25 Z" 
                      fill="#fffcfc" />

                <!-- Зерна (уменьшенные, изящный вектор) -->
                <circle cx="42" cy="42" r="3" fill="#ba0012" />
                <circle cx="58" cy="42" r="3" fill="#ba0012" />
                <circle cx="50" cy="50" r="3.5" fill="#ba0012" />
                <circle cx="40" cy="58" r="3" fill="#ba0012" />
                <circle cx="60" cy="58" r="3" fill="#ba0012" />
                <circle cx="50" cy="68" r="3" fill="#ba0012" />
                <circle cx="32" cy="50" r="2.5" fill="#ba0012" />
                <circle cx="68" cy="50" r="2.5" fill="#ba0012" />
                <circle cx="40" cy="72" r="2.5" fill="#ba0012" />
                <circle cx="60" cy="72" r="2.5" fill="#ba0012" />
            </svg>
        </div>
        
        <h1 class="brand-name">Anor zo'r</h1>
        
        <h2>Куда доставить</h2>
        
        <div class="input-group">
            <input type="text" id="addressInput" placeholder="Введите адрес">
        </div>
        
        <button class="btn-primary" onclick="goToDashboard()">Продолжить</button>
    </div>

    <script>
        function goToDashboard() {
            const address = document.getElementById('addressInput').value.trim();
            if (address) {
                localStorage.setItem('userAddress', address);
                window.location.href = 'dashboard.html';
            } else {
                alert('Пожалуйста, введите адрес');
            }
        }
    </script>
</body>
</html>
